frost:
  # Phenological phase thresholds (Corylus avellana, Black Sea Turkey):
  #   Feb 1  – Mar 14: catkin emergence, pollination    → -5.0°C
  #   Mar 15 – Mar 31: post-pollination, fertilization  → -3.0°C
  #   Apr 1  – Apr 30: nut set, young fruit             → -1.5°C  (most sensitive)
  #   May 1  – May 31: early nut development            → -1.5°C
  threshold_pollination: -5.0   # °C, Feb 1 – Mar 14  — supported by multiple sources for catkin/flower damage
  threshold_march: -3.0         # °C, Mar 15–31       — partially supported; -2.3°C no-damage finding was April-specific
  threshold_april: -2.3         # °C, Apr 1–30        — BIO Web of Conferences 2021 (Russian vars): -2.3°C caused no damage; damage onset below this
  threshold_may: -2.3           # °C, May 1–31        — no specific literature; applying same as April (same developmental stage)
  window_start: [2, 1]          # [month, day]
  window_end: [5, 31]           # [month, day]
  payout_bands:
    - [0,   10,  0.00, 0.00]
    - [10,  25,  0.00, 0.00]
    - [25,  50,  0.25, 0.50]
    - [50,  100, 0.50, 0.90]
    - [100, .inf, 0.90, 1.00]

production:
  baseline_window: 5         # years
  exclude_worst_n: 1         # drop worst year from baseline window
  payout_bands:
    # [lo, hi, payout_at_lo, payout_at_hi]
    # shortfall is negative; lo is more severe (more negative), hi is less severe.
    # payout_at_lo > payout_at_hi: worse shortfall → higher payout.
    - [-1.00, -0.50, 1.00, 0.90]   # lo=-100% (zero production): 100%; hi=-50%: 90%
    - [-0.50, -0.35, 0.90, 0.50]   # lo=-50%: 90%; hi=-35%: 50%
    - [-0.35, -0.20, 0.50, 0.25]   # lo=-35%: 50%; hi=-20%: 25%
    - [-0.20, -0.10, 0.00, 0.00]
    - [-0.10,  .inf, 0.00, 0.00]
  # 2025 override (TÜİK announced; FAOSTAT not yet updated)
  production_overrides:
    2025: 520000  # metric tons

drought:
  spei_variable: SPEI03      # 3-month SPEI
  reference_month: 8         # August (captures JJA)
  payout_bands:
    # [lo, hi, payout_at_lo, payout_at_hi]
    # SPEI is negative in drought; lo is more severe (more negative).
    - [-.inf, -2.0, 0.30, 0.25]   # extreme drought: 30% at worst, 25% at -2.0
    - [-2.0,  -1.5, 0.25, 0.10]   # severe drought: 25% at -2.0, 10% at -1.5
    - [-1.5,  -1.0, 0.00, 0.00]
    - [-1.0,   .inf, 0.00, 0.00]

# hail: REMOVED — no usable data source.
#   ERA5 convective precipitation is not a hail proxy (sub-grid, all convective rain).
#   European Severe Weather Database (ESWD, eswd.eu) reviewed: Turkey coverage is
#   sparse point observations with no programmatic API; not usable for annual time series.
#   No priceable hail trigger can be constructed. Peril is real but unquantifiable.

named_perils:
  efb_outbreak:
    # Source: EFSA PLH Panel (2018), "Pest categorisation of Anisogramma anomala"
    # EFSA Journal 16(2):5184. https://pmc.ncbi.nlm.nih.gov/articles/PMC7009558/
    # EFB is not present in Europe or Turkey; classified as EU quarantine organism.
    # 0 entries into Europe in 90 years. Bayesian (Jeffreys prior on Poisson):
    #   lambda_posterior = 0.5/90 ≈ 0.6%/yr; discounted 50% for Turkey distance
    #   → 0.3%/yr. Turkey varieties largely susceptible; expected loss if outbreak ≥50%.
    annual_probability: 0.003   # 0.3% per year
    payout: 0.50
    note: "EFSA 2018 quarantine risk; Jeffreys prior on 0 events/90yr, 0.5x Turkey discount"
  export_disruption:
    # Source: USDA FAS GAIN reports (2022 export ban on grains/oils; not hazelnuts directly).
    # ISHS (2001) "Turkish Hazelnut and FİSKOBİRLİK"; TMO intervention history.
    # Qualifying events (hazelnut-specific restriction >10% Aug-Dec exports): ~1-2 in 35yr.
    # Rate: 1-2/35 = 3-6%/yr. 3% is the conservative floor.
    annual_probability: 0.03    # 3% per year
    payout: 0.25
    note: "USDA FAS; 1-2 qualifying hazelnut export interventions in 35yr = 3-6%/yr rate"
  logistics_disruption:
    # Source: Montreux Convention (1936) Arts 2, 10, 19; Lieber Institute (2022)
    # "Closing the Turkish Straits in Times of War."
    # 0 commercial closures >30 days in 90yr of Montreux. P(closure) requires
    # Turkey to be a direct war belligerent:
    #   P(Turkey in major war) ~1.5%/yr × P(commercial closure|war) ~15%
    #   × P(>30 days|closed) ~50% ≈ 0.11%/yr.
    # Jeffreys prior baseline: 0.5/90 = 0.6%/yr; war-conditional model: 0.11%/yr.
    # Using 0.15%/yr as midpoint.
    annual_probability: 0.0015  # 0.15% per year
    payout: 0.15
    note: "Montreux Convention; 0 qualifying events in 90yr; P(Turkey at war)*P(closure|war)"

pollination:
  # Black Sea coast Turkey: median Feb+Mar precip ~210mm, std ~38mm.
  # Deductible at P90 (~250mm) targets exceptional wet bloom periods
  # that genuinely disrupt wind pollination.  Fires ~9% of years.
  # Max payout 15%: pollination failure is rarely total at the basket level.
  bloom_months: [2, 3]
  deductible_mm: 250.0
  payout_bands:
    # [lo, hi, payout_at_lo, payout_at_hi]
    - [300.0, .inf, 0.15, 0.15]   # extreme wet bloom: flat 15%
    - [270.0, 300.0, 0.15, 0.08]  # ramp 8%→15%
    - [250.0, 270.0, 0.08, 0.00]  # ramp 0%→8%
    - [0.0,   250.0, 0.00, 0.00]  # below deductible

lira:
  # Trigger metric: annual TRY/USD depreciation rate (e.g. -0.44 = lost 44%)
  # Deductible at -20%: TRY loses ~15-20%/yr on average since 2010; not a stress event.
  # Payout ramps from -20% to -40% (partial squeeze), caps at -60% (20% of notional).
  # Cap rationale: above -60%, hazelnut export prices rally in lira enough to partially
  # offset further input cost inflation. Farmers on forward contracts remain exposed.
  # Data: Yahoo Finance TRYUSD=X 2005–present.
  deductible: -0.20
  payout_bands:
    # [lo, hi, payout_at_lo, payout_at_hi]
    # depreciation is negative (TRY weaker); lo is more severe (more negative)
    - [-1.00, -0.60, 0.20, 0.20]   # cap: >60% depr → flat 20%
    - [-0.60, -0.40, 0.20, 0.10]   # severe: 20% at -60%, 10% at -40%
    - [-0.40, -0.20, 0.10, 0.00]   # moderate: 10% at -40%, 0% at -20%
    - [-0.20,  1.00, 0.00, 0.00]   # below deductible: no payout

aggregation:
  core_triggers: [frost, production]
  core_rule: max              # substitutive: frost and production measure correlated events
  additive_triggers: [drought, efb_outbreak, export_disruption, logistics_disruption]  # hail removed: no usable data source
  annual_cap: 1.0

backtest_window:
  start: 1990
  end: 2024
